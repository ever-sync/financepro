version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: financeiro-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-financeiro123}
      POSTGRES_DB: ${DB_NAME:-financeiro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-financeiro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financeiro-network
    restart: unless-stopped

  # Backend API (tRPC/Express)
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: financeiro-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-financeiro123}@postgres:5432/${DB_NAME:-financeiro}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - financeiro-network
    restart: unless-stopped

  # Frontend (React/Vite)
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: financeiro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - financeiro-network
    restart: unless-stopped

  # Redis (for caching and sessions - optional)
  redis:
    image: redis:7-alpine
    container_name: financeiro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financeiro-network
    restart: unless-stopped

  # Automated Backup Service
  backup:
    image: postgres:15-alpine
    container_name: financeiro-backup
    environment:
      DB_NAME: ${DB_NAME:-financeiro}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-financeiro123}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./scripts:/scripts
      - ./backups:/backups
    command: >
      sh -c "chmod +x /scripts/backup.sh && 
             while true; do 
               /scripts/backup.sh; 
               sleep 86400; 
             done"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - financeiro-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  financeiro-network:
    driver: bridge
